[project]
name = "fedsoc-ai"
version = "0.1.0"
description = "Core ML and LLM reasoning utilities for FedSOC AI"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "scikit-learn>=1.4.0",
    "xgboost>=2.0.0",
    "numpy>=1.26.0",
    "pandas>=2.2.0",
    "httpx>=0.27.0",
    "pydantic>=2.6.0",
    "loguru>=0.7.0",
    "pyarrow>=15.0.0",
    "matplotlib>=3.11.0",
    "scipy>=1.18.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "mypy>=1.8.0"
]
